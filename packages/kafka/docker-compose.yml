version: "3.8"

services:
  kafka-broker-1:
    image: apache/kafka:3.7.1
    container_name: kafka-broker-1
    restart: always
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://0.0.0.0:9094
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka-broker-1:9092,EXTERNAL://<IP_CỦA_VPS>:9094 # Sửa localhost thành IP VPS của bạn
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka-broker-1:9093 # Chỉ còn 1 node
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CLUSTER_ID=xK9mQr2sLpVbN8hTcYwEzA
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      # Giới hạn RAM cho Kafka (Rất quan trọng cho VPS 2GB)
      - KAFKA_HEAP_OPTS=-Xmx512m -Xms256m
    ports:
      - "9094:9094"
    networks:
      - stazy-network

  postgres:
    image: pgvector/pgvector:pg16
    container_name: stazy-db
    restart: always
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=123456
      - POSTGRES_DB=products
    ports:
      - "5432:5432"
    networks:
      - stazy-network

  redis:
    image: redis:7.2-alpine
    container_name: stazy-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - stazy-network

