version: "3.8"

services:
  kafka-broker-1:
    image: apache/kafka:3.7.1
    container_name: kafka-broker-1
    restart: always
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://0.0.0.0:9094
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka-broker-1:9092,EXTERNAL://<IP_VPS_CỦA_BẠN>:9094
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka-broker-1:9093
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CLUSTER_ID=xK9mQr2sLpVbN8hTcYwEzA
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_HEAP_OPTS=-Xmx400m -Xms256m # Ép JVM chỉ lấy max 400MB
    ports:
      - "9094:9094"
    networks:
      - stazy-network
    deploy:
      resources:
        limits:
          memory: 700M # Hard limit của Docker container

  postgres:
    image: pgvector/pgvector:pg16
    container_name: stazy-db
    restart: always
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=123456
      - POSTGRES_DB=products
    ports:
      - "5432:5432"
    command: >
      postgres
      -c shared_buffers=128MB
      -c max_connections=20
    networks:
      - stazy-network
    deploy:
      resources:
        limits:
          memory: 300M

  redis:
    image: redis:7.2-alpine
    container_name: stazy-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - stazy-network
    deploy:
      resources:
        limits:
          memory: 150M

networks:
  stazy-network:
    driver: bridge

volumes:
  redis_data:
    driver: local
