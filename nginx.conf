# Nginx Configuration for STAZY Payment Service with Stripe Webhook
# This config proxies HTTP/HTTPS traffic to Payment Service (port 8002)
# Setup: Place in /etc/nginx/sites-available/ on VPS and symlink to sites-enabled/
# Then: sudo systemctl restart nginx

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Let Certbot verify domain
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS (except acme-challenge)
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Configuration (with SSL certificate from Certbot)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;  # Replace with actual domain when you set it up

    # SSL Configuration (Certbot will auto-fill these paths)
    # ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 1000;

    # Proxy settings
    proxy_read_timeout 600s;
    proxy_connect_timeout 600s;
    proxy_send_timeout 600s;

    # Main proxy block: all requests → Payment Service
    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;

        # Headers for proper proxying
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # WebSocket support (if needed for real-time updates)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Buffering
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Stripe Webhook endpoint (can be more restrictive if needed)
    location /webhooks/stripe {
        proxy_pass http://127.0.0.1:8002/webhooks/stripe;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Important: Don't buffer webhook body for Stripe signature validation
        proxy_request_buffering off;
        proxy_buffering off;

        client_max_body_size 10M;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://127.0.0.1:8002/health;
        proxy_http_version 1.1;
        access_log off;
    }

    # Block access to sensitive paths
    location ~ /admin {
        return 403;
    }
}
